spring.application.name=servicio-pacientes
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/pacientes_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# data.sql desactivado: los pacientes ahora vienen de seed_rednorte.sql (no se borra el archivo, por si hay que volver atrás).
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
