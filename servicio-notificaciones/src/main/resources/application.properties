server.port=8084

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5436/notificaciones_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# URL base para construir links de confirmaciĂłn (ajustar a la URL real del frontend)
app.confirmar.url.base=${FRONTEND_URL:http://localhost:5173}