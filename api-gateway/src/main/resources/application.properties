server.port=8080

# URLs internas hacia microservicios (server-to-server). Una variable por servicio
# destino; el fallback es la URL local actual de cada servicio.
services.pacientes.url=${SERVICIO_PACIENTES_URL:http://localhost:8081}
services.lista-espera.url=${SERVICIO_LISTA_ESPERA_URL:http://localhost:8082}
services.reasignacion.url=${SERVICIO_REASIGNACION_URL:http://localhost:8083}
services.notificaciones.url=${SERVICIO_NOTIFICACIONES_URL:http://localhost:8084}

# Rutas hacia microservicios (Spring Cloud Gateway)
spring.cloud.gateway.server.webflux.routes[0].id=servicio-pacientes
spring.cloud.gateway.server.webflux.routes[0].uri=${services.pacientes.url}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/pacientes/**

spring.cloud.gateway.server.webflux.routes[1].id=servicio-lista-espera
spring.cloud.gateway.server.webflux.routes[1].uri=${services.lista-espera.url}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/listas-espera/**

spring.cloud.gateway.server.webflux.routes[2].id=servicio-lista-espera-citas
spring.cloud.gateway.server.webflux.routes[2].uri=${services.lista-espera.url}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/citas/**

spring.cloud.gateway.server.webflux.routes[3].id=servicio-lista-espera-matching
spring.cloud.gateway.server.webflux.routes[3].uri=${services.lista-espera.url}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/matching/**

spring.cloud.gateway.server.webflux.routes[4].id=servicio-reasignacion
spring.cloud.gateway.server.webflux.routes[4].uri=${services.reasignacion.url}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/reasignaciones/**

spring.cloud.gateway.server.webflux.routes[5].id=servicio-notificaciones
spring.cloud.gateway.server.webflux.routes[5].uri=${services.notificaciones.url}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/notificaciones/**

spring.cloud.gateway.server.webflux.routes[6].id=servicio-reasignacion-ofertas
spring.cloud.gateway.server.webflux.routes[6].uri=${services.reasignacion.url}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/ofertas/**

# JWT
jwt.secret=${JWT_SECRET:cmVkbm9ydGUtand0LXNlY3JldC1rZXktMjAyNi1tdXktc2VndXJhLXktbGFyZ2E=}
jwt.expiration=86400000

# Contrasena por defecto para clientes
app.cliente.password=${APP_CLIENTE_PASSWORD:rednorte2026}

# CORS: origenes permitidos por el gateway (lista separada por comas)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Swagger / SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.webjars.prefix=
